<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아프냐 나도아프다 — AI 서비스 컨디션</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --line:#262b35; --muted:#8b93a3; --text:#e7eaf0;
    --green:#27c093; --amber:#e6a817; --coral:#e4663b; --red:#e2484a; --blue:#3b8add; --gray:#5f6573;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:40px 20px 80px}
  header{text-align:center;margin-bottom:8px}
  h1{font-size:30px;font-weight:700;margin:0 0 6px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:0}
  .ward{display:flex;align-items:center;justify-content:center;gap:14px;margin:28px 0 8px;
    padding:18px;background:var(--card);border:1px solid var(--line);border-radius:16px}
  .ward .big{font-size:18px;font-weight:600}
  .ward .pulse{width:12px;height:12px;border-radius:50%;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:0 0 28px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:50%}
  .cat{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
    margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
  .card:hover{border-color:#3a4250}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .name{font-weight:600;font-size:15px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .cond{font-size:13px;font-weight:600}
  .desc{font-size:12px;color:var(--muted);line-height:1.5;min-height:1.5em}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:34px;line-height:1.8}
  a{color:var(--blue);text-decoration:none}
  .skeleton{color:var(--gray)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>아프냐 나도아프다</h1>
    <p class="sub">내가 의존하는 AI들의 컨디션을 한눈에. 쟤가 아프면 내 작업도 멈춘다.</p>
  </header>

  <div class="ward" id="ward">
    <span class="pulse" style="background:var(--gray)"></span>
    <span class="big" id="ward-text">병동 회진 중...</span>
  </div>

  <div class="legend">
    <span><i style="background:var(--green)"></i>건강함</span>
    <span><i style="background:var(--amber)"></i>미열</span>
    <span><i style="background:var(--coral)"></i>몸살</span>
    <span><i style="background:var(--red)"></i>응급실</span>
    <span><i style="background:var(--blue)"></i>정기검진</span>
    <span><i style="background:var(--gray)"></i>무응답</span>
  </div>

  <div id="board"></div>

  <p class="foot">
    데이터: 각 서비스 공식 status 페이지(Statuspage / Instatus API). 60초마다 자동 회진.<br>
    프로토타입 — 진단은 참고용입니다.
  </p>
</div>

<script>
// 진료 대상. type: "statuspage"(/api/v2/status.json) | "instatus"(/summary.json)
const PATIENTS = [
  // 모델 · API
  { name: "OpenAI",      host: "status.openai.com",         type: "statuspage", cat: "모델 · API" },
  { name: "Claude",      host: "status.claude.com",         type: "statuspage", cat: "모델 · API" },
  { name: "Perplexity",  host: "status.perplexity.com",     type: "instatus",   cat: "모델 · API" },
  { name: "Cohere",      host: "status.cohere.com",         type: "statuspage", cat: "모델 · API" },
  { name: "Groq",        host: "groqstatus.com",            type: "statuspage", cat: "모델 · API" },
  { name: "Replicate",   host: "www.replicatestatus.com",   type: "statuspage", cat: "모델 · API" },
  // 음성 · 미디어
  { name: "ElevenLabs",  host: "status.elevenlabs.io",      type: "statuspage", cat: "음성 · 미디어" },
  { name: "Stability AI",host: "status.stability.ai",       type: "statuspage", cat: "음성 · 미디어" },
  { name: "Runway",      host: "status.runwayml.com",       type: "statuspage", cat: "음성 · 미디어" },
  // 코딩 도구
  { name: "Cursor",      host: "status.cursor.com",         type: "statuspage", cat: "코딩 도구" },
  { name: "Windsurf",    host: "status.windsurf.com",       type: "statuspage", cat: "코딩 도구" },
  { name: "Lovable",     host: "status.lovable.dev",        type: "statuspage", cat: "코딩 도구" },
  { name: "v0",          host: "v0-status.com",             type: "statuspage", cat: "코딩 도구" },
  { name: "GitHub",      host: "www.githubstatus.com",      type: "statuspage", cat: "코딩 도구" },
  // 인프라
  { name: "Pinecone",    host: "status.pinecone.io",        type: "statuspage", cat: "인프라" },
  { name: "LangSmith",   host: "status.smith.langchain.com",type: "statuspage", cat: "인프라" },
  { name: "Supabase",    host: "status.supabase.com",       type: "statuspage", cat: "인프라" },
  { name: "Vercel",      host: "www.vercel-status.com",     type: "statuspage", cat: "인프라" },
];

const CONDITION = {
  none:        { label: "건강함",   color: "var(--green)", desc: "정상 진료 중" },
  minor:       { label: "미열",     color: "var(--amber)", desc: "경미한 이상" },
  major:       { label: "몸살",     color: "var(--coral)", desc: "주요 기능 저하" },
  critical:    { label: "응급실",   color: "var(--red)",   desc: "심각한 장애" },
  maintenance: { label: "정기검진", color: "var(--blue)",  desc: "점검 중" },
  unknown:     { label: "무응답",   color: "var(--gray)",  desc: "상태 확인 불가" },
};

// Instatus page.status -> indicator
const INSTATUS_MAP = {
  UP: "none", HASISSUES: "major", UNDERMAINTENANCE: "maintenance",
  DEGRADEDPERFORMANCE: "minor", PARTIALOUTAGE: "major", MINOROUTAGE: "minor",
  MAJOROUTAGE: "critical",
};

const board = document.getElementById("board");
const cards = {};

// 카테고리별 섹션 + 카드 골격 생성
const cats = [...new Set(PATIENTS.map(p => p.cat))];
for (const cat of cats){
  const h = document.createElement("div"); h.className = "cat"; h.textContent = cat;
  board.appendChild(h);
  const g = document.createElement("div"); g.className = "grid";
  board.appendChild(g);
  for (const p of PATIENTS.filter(x => x.cat === cat)){
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="row">
        <span class="name">${p.name}</span>
        <span class="dot skeleton" style="background:var(--gray)"></span>
      </div>
      <span class="cond skeleton">진단 중...</span>
      <div class="desc"></div>`;
    g.appendChild(c);
    cards[p.host] = c;
  }
}

async function diagnose(p){
  const card = cards[p.host];
  let ind = "unknown", description = "";
  try{
    if (p.type === "instatus"){
      const r = await fetch(`https://${p.host}/summary.json`, {cache:"no-store"});
      const j = await r.json();
      ind = INSTATUS_MAP[(j.page && j.page.status) || ""] || "unknown";
    } else {
      const r = await fetch(`https://${p.host}/api/v2/status.json`, {cache:"no-store"});
      const j = await r.json();
      ind = j.status.indicator || "none";
      description = j.status.description || "";
    }
  }catch(e){ ind = "unknown"; }

  const cond = CONDITION[ind] || CONDITION.unknown;
  const dot = card.querySelector(".dot");
  dot.style.background = cond.color; dot.classList.remove("skeleton");
  const condEl = card.querySelector(".cond");
  condEl.textContent = cond.label; condEl.style.color = cond.color; condEl.classList.remove("skeleton");
  card.querySelector(".desc").textContent = description || cond.desc;
  return ind;
}

async function rounds(){
  const results = await Promise.all(PATIENTS.map(diagnose));
  const sick = results.filter(i => i && !["none","unknown"].includes(i)).length;
  const unknown = results.filter(i => i === "unknown").length;
  const ward = document.getElementById("ward");
  const text = document.getElementById("ward-text");
  const pulse = ward.querySelector(".pulse");
  if (sick === 0 && unknown === 0){
    text.textContent = "전원 건강. 오늘은 다 같이 무사합니다.";
    pulse.style.background = "var(--green)";
  } else if (sick > 0){
    text.textContent = `${sick}곳이 아픕니다. 그쪽 작업은 잠시 쉬어가세요.`;
    pulse.style.background = "var(--red)";
  } else {
    text.textContent = `${unknown}곳 응답 없음. 상태 확인이 어렵습니다.`;
    pulse.style.background = "var(--gray)";
  }
}

rounds();
setInterval(rounds, 60000);
</script>
</body>
</html>
